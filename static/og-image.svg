<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#3b1e50"/>
      <stop offset="45%" stop-color="#181028"/>
      <stop offset="100%" stop-color="#0f0f13"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d5000d"/>
      <stop offset="100%" stop-color="#ff5566"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stars: hand-tuned positions for a balanced field -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="80"  cy="60"  r="1.2"/>
    <circle cx="220" cy="120" r="0.8"/>
    <circle cx="350" cy="40"  r="1.6"/>
    <circle cx="500" cy="90"  r="0.9"/>
    <circle cx="640" cy="55"  r="1.1"/>
    <circle cx="820" cy="100" r="0.7"/>
    <circle cx="980" cy="70"  r="1.4"/>
    <circle cx="1120" cy="130" r="1.0"/>
    <circle cx="60"  cy="220" r="0.9"/>
    <circle cx="180" cy="320" r="1.3"/>
    <circle cx="280" cy="200" r="0.6"/>
    <circle cx="440" cy="270" r="1.0"/>
    <circle cx="900" cy="240" r="1.2"/>
    <circle cx="1050" cy="320" r="0.8"/>
    <circle cx="1150" cy="220" r="1.5"/>
    <circle cx="100" cy="500" r="1.1"/>
    <circle cx="240" cy="560" r="0.7"/>
    <circle cx="400" cy="490" r="1.3"/>
    <circle cx="560" cy="540" r="0.9"/>
    <circle cx="720" cy="480" r="0.6"/>
    <circle cx="860" cy="560" r="1.4"/>
    <circle cx="980" cy="500" r="0.8"/>
    <circle cx="1100" cy="540" r="1.0"/>
    <circle cx="160" cy="420" r="0.7"/>
    <circle cx="600" cy="170" r="1.6" fill="#ffe9c8"/>
    <circle cx="380" cy="380" r="1.4" fill="#cfe0ff"/>
    <circle cx="940" cy="400" r="1.5" fill="#ffd1d1"/>
  </g>

  <!-- Accent rule -->
  <rect x="80" y="232" width="56" height="4" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Eyebrow -->
  <text x="80" y="216" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="600"
        letter-spacing="3" fill="#d5000d">REAGAN HOWELL</text>

  <!-- Name -->
  <text x="78" y="330" font-family="'Chivo', 'Inter', system-ui, sans-serif" font-size="92" font-weight="900"
        fill="#ffffff" letter-spacing="-2">Applied Mathematics</text>
  <text x="78" y="420" font-family="'Chivo', 'Inter', system-ui, sans-serif" font-size="92" font-weight="900"
        fill="#ffffff" letter-spacing="-2">Software · Hardware</text>

  <!-- Tagline -->
  <text x="80" y="495" font-family="'Inter', system-ui, sans-serif" font-size="24" font-weight="500"
        fill="#9090b8">Personal site &amp; portfolio · rhowel33.github.io</text>
</svg>
